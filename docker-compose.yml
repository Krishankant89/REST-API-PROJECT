services:

  api:
    build:
      context: .
      dockerfile: configs/docker/Dockerfile

    container_name: fastapi-api

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/tasksdb

    depends_on:
      - db

    volumes:
      - .:/app

    restart: always


  db:
    image: postgres:15

    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tasksdb

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always


volumes:
  postgres_data: